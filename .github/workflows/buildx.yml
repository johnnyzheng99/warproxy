name: buildx

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - docker-compose.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/warproxy

jobs:
  buildx:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: ${{ env.IMAGE_NAME }}:testing
          platforms: linux/arm64, linux/amd64
          load: true

      - name: Test image
        run: |
          CID=$(docker run -d ${{ env.IMAGE_NAME }}:testing)
          sleep 5
          if [ "$(docker exec -i "$CID" wireproxy --help | head -1 | cut -d ' ' -f2)" != "wireproxy" ]; then
            docker logs "$CID"
            docker rm -f "$CID"
            exit 1
          fi
          docker rm -f "$CID"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: ${{ env.IMAGE_NAME }}:latest
          platforms: linux/arm64, linux/amd64
          push: true
